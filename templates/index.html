<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Oficios - Jesús Rey Leads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: #1a2a3a; color: white; padding: 20px; text-align: center; margin-bottom: 20px; }
        .card-lead { border-left: 6px solid #28a745; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="navbar"><h1>🛠️ BUSCADOR DE TRABAJO OFICIAL</h1></div>
    <div class="container">
        <form method="POST" class="bg-white p-4 shadow-sm rounded mb-4">
            <div class="row g-2">
                <div class="col-md-5"><input type="text" name="zona" class="form-control" placeholder="Zona (Ej: Laferrere)"></div>
                <div class="col-md-5"><input type="text" name="rubro" class="form-control" placeholder="Oficio (Ej: Albañil)"></div>
                <div class="col-md-2 d-grid"><button type="submit" class="btn btn-success">BUSCAR</button></div>
            </div>
        </form>
        <div class="list-group">
            {% for lead in resultados %}
            <div class="list-group-item card-lead shadow-sm">
                <h5 class="text-success">{{ lead.rubro }} - {{ lead.zona }}</h5>
                <p>{{ lead.descripcion }}</p>
                <a href="https://{{ lead.contacto }}" class="btn btn-sm btn-primary">WhatsApp</a>
            </div>
            {% else %}
            <p class="text-center text-muted">Buscá por zona o rubro para empezar.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
