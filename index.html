<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesús Rey - Leads de Obra</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4">
    <div class="max-w-md mx-auto">
        <header class="py-6 text-center">
            <h1 class="text-2xl font-black text-amber-500 uppercase">Jesús Rey Leads</h1>
            <p class="text-slate-400 text-sm">Buscador de Obras en Tiempo Real</p>
        </header>

        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Zona</label>
            <select id="zona" class="w-full bg-slate-700 p-3 rounded-lg mb-4 outline-none">
                <option value="laferrere">Laferrère</option>
                <option value="catan">González Catán</option>
                <option value="san-justo">San Justo</option>
            </select>

            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Rubro</label>
            <select id="rubro" class="w-full bg-slate-700 p-3 rounded-lg mb-6 outline-none">
                <option value="albañileria">Albañilería</option>
                <option value="seguridad">Seguridad</option>
                <option value="ventas">Ventas</option>
            </select>

            <button onclick="buscarLead()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-black py-4 rounded-xl shadow-lg shadow-amber-500/20 transition-all">
                🔍 BUSCAR CLIENTES
            </button>
        </div>

        <div id="lista-resultados" class="mt-8 space-y-4"></div>
    </div>

    <script>
        async function buscarLead() {
            const zona = document.getElementById('zona').value;
            const rubro = document.getElementById('rubro').value;
            const lista = document.getElementById('lista-resultados');
            
            lista.innerHTML = '<div class="text-center py-10 animate-pulse text-amber-500 font-bold">Rastreando oportunidades...</div>';
            
            try {
                const response = await fetch(`/api/buscar?zona=${zona}&rubro=${rubro}`);
                const data = await response.json();
                
                if (data.length === 0) {
                    lista.innerHTML = '<p class="text-center text-slate-500">No hay pedidos nuevos en esta zona hoy.</p>';
                    return;
                }

                lista.innerHTML = data.map(item => `
                    <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-amber-500">
                        <span class="text-[10px] bg-amber-500/10 text-amber-500 px-2 py-1 rounded-full font-bold uppercase">¡NUEVO!</span>
                        <h3 class="mt-2 font-bold text-lg">${item.detalle}</h3>
                        <div class="mt-4 flex gap-2">
                            <a href="${item.contacto}" target="_blank" class="bg-green-600 text-xs font-bold px-4 py-2 rounded-lg text-white">Contactar Cliente</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                lista.innerHTML = '<p class="text-red-500">Error al conectar con el motor.</p>';
            }
        }
    </script>
</body>
</html>
